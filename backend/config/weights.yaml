# 신호별 가중치. 각 신호 스코어는 [-1, +1] 범위, 가중합 후 시그모이드로 확률화.
# 상방 확률 = sigmoid(sigmoid_k × Σ(score × weight))

sigmoid_k: 2.5

weights:
  arrangement: 0.25      # 이동평균 배열 (정배열 +1 / 역배열 -1 / 혼조 부분점수)
  cross_5_20: 0.15       # 5-20 골든/데드크로스 (최근 30일 내, 최신일수록 강함)
  cross_20_60: 0.15      # 20-60 크로스
  cross_60_120: 0.10     # 60-120 크로스
  ma200_anchor: 0.10     # 200일선 상/하 (장기 추세 앵커)
  disparity: 0.15        # 200일선 이격도 과열/침체 (+5/10% 구간 페널티)
  support: 0.12          # 주요 이평선 지지/저항 테스트
  volume: 0.10           # 거래량 추세 (20일 평균 대비)
  rsi: 0.10              # RSI 과매수/과매도
  macd: 0.10             # MACD 히스토그램 방향
  mtf_alignment: 0.15    # 멀티 타임프레임 정합성 (step 9에서 활성화)

# 크로스 신호에 거래량 동반 시 신뢰도 가중 배수
volume_confirm_multiplier: 1.3

# 크로스 발생 후 경과일에 따른 감쇠 (일)
cross_decay_days: 30

# 신호별 가중치. 각 신호 스코어는 [-1, +1], 가중합 후 시그모이드로 확률화.
# 상방 확률 = sigmoid(sigmoid_k × Σ(score × weight))
#
# 우선순위 원칙: 거래량 > 지지·저항 > 추세 > 이평선 > 캔들패턴 > 보조지표
# 여러 계열이 같은 방향일 때 multi_confirm 가산.

sigmoid_k: 2.2

weights:
  # 1순위 — 거래량 (가격은 속여도 거래량은 못 속인다)
  volume: 0.18           # 20일 평균 대비 거래량 추세
  fake_breakout: 0.15    # 거래량 미동반 돌파 감점

  # 2순위 — 수평 지지·저항 (매물대)
  sr_level: 0.16         # 스윙 고저점 클러스터 지지/저항/돌파

  # 3순위 — 추세선·채널
  trend_channel: 0.13    # 회귀 추세 기울기
  channel_break: 0.12    # 채널 이탈 (전환 초기 신호)

  # 4순위 — 이동평균선
  arrangement: 0.10      # 정배열/역배열
  cross_5_20: 0.08
  cross_20_60: 0.08
  cross_60_120: 0.05
  ma200_anchor: 0.07     # 장기 추세 앵커
  disparity: 0.08        # 200일 이격 과열/침체
  support: 0.06          # 이평선 지지 테스트

  # 5순위 — 캔들패턴 (지지/저항 자리에서만 유효, 허공은 0.2배)
  candle_pattern: 0.06

  # 6순위 — 보조지표
  rsi: 0.04
  macd: 0.04
  bollinger: 0.05        # 스퀴즈 후 확장 방향
  rsi_divergence: 0.07   # 다이버전스는 보조지표 중 가중 높음

  # 멀티 컨펌 — 서로 다른 계열 3개 이상 동방향 시 가산
  multi_confirm: 0.12

  # step 9(분봉 정합성) 예약
  mtf_alignment: 0.15

# 크로스 신호에 거래량 동반 시 신뢰도 가중 배수
volume_confirm_multiplier: 1.3

# 크로스 발생 후 경과일에 따른 감쇠 (일)
cross_decay_days: 30
